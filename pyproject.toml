[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["src/data", "src/models"]
omit = [
    "src/data/01_download_era5.py",
    "src/data/03_test_query.py",
    "src/models/07_train_loop.py",
    "src/models/09_train_real_data.py",
    "src/models/11_cost_optimizer.py",
    "src/models/12_dynamic_risk_map.py",
    "src/models/01_xgboost_baseline.py",
]

[tool.coverage.report]
fail_under = 95
show_missing = true
exclude_lines = [
    "if __name__",
    "pragma: no cover",
]
